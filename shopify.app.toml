# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# Replace client_id and the URLs below with your new Shopify app's values.
# After deploying to Coolify, set application_url / redirect / webhook URLs to your
# Coolify domain, or run `shopify app config link` to sync from the Partner Dashboard.

client_id = "958a613936c6a38625a1451c1cace214"
name = "HideStock"
application_url = "https://REPLACE_WITH_YOUR_COOLIFY_DOMAIN"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[webhooks.privacy_compliance]
customer_deletion_url = "https://REPLACE_WITH_YOUR_COOLIFY_DOMAIN/webhooks"
customer_data_request_url = "https://REPLACE_WITH_YOUR_COOLIFY_DOMAIN/webhooks"
shop_deletion_url = "https://REPLACE_WITH_YOUR_COOLIFY_DOMAIN/webhooks"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,read_inventory,read_themes"

[auth]
redirect_urls = [ "https://REPLACE_WITH_YOUR_COOLIFY_DOMAIN/auth/callback" ]
